<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Frapto Transp — Rastreio</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b1020;
        color: #e5e7eb;
        min-height: 100vh;
      }
      .wrap {
        max-width: 460px;
        margin: 0 auto;
        padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0 24px;
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        display: grid;
        place-items: center;
        font-size: 20px;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      .muted {
        color: #94a3b8;
        font-size: 13px;
        margin: 2px 0 0;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 14px 0 6px;
        color: #cbd5e1;
      }
      input {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #334155;
        background: #111827;
        color: #fff;
        font-size: 16px;
      }
      button {
        width: 100%;
        margin-top: 18px;
        padding: 15px;
        border: 0;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }
      button.stop {
        background: #b91c1c;
      }
      button:disabled {
        opacity: 0.6;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 20px;
        margin-top: 16px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #64748b;
      }
      .dot.on {
        background: #22c55e;
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18);
      }
      .err {
        color: #fca5a5;
        font-size: 13px;
        margin-top: 12px;
        min-height: 16px;
      }
      .hidden {
        display: none;
      }
      .link {
        background: none;
        color: #93c5fd;
        font-weight: 400;
        font-size: 13px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <div class="logo">🚚</div>
        <div>
          <h1>Frapto Transp</h1>
          <p class="muted">Rastreio do motorista</p>
        </div>
      </div>

      <!-- LOGIN -->
      <div id="loginView">
        <label for="username">Usuário</label>
        <input id="username" autocapitalize="none" autocomplete="username" />
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
        />
        <button id="loginBtn">Entrar</button>
        <p class="err" id="loginErr"></p>
        <p class="muted">
          Use o mesmo usuário e senha do app do motorista.
        </p>
      </div>

      <!-- RASTREIO -->
      <div id="trackView" class="hidden">
        <div class="card">
          <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Parado</span>
          </div>
          <p class="muted" id="driverName"></p>
          <p class="muted" id="lastPing" style="margin-top: 10px"></p>
        </div>
        <button id="startBtn">Iniciar rastreamento</button>
        <button id="stopBtn" class="stop hidden">Parar rastreamento</button>
        <p class="err" id="trackErr"></p>
        <p class="muted" style="margin-top: 14px">
          Pode fechar o app e usar o Waze normalmente: o rastreio continua em
          segundo plano. O sistema só registra a posição quando você tem uma
          viagem em andamento.
        </p>
        <button class="link" id="logoutBtn">Sair / trocar de usuário</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
